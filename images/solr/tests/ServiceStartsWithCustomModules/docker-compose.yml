---

# Common to all services
x-common: &common
  restart: "no"

name: solr-servicestartswithcustommodules
services:
  solr:
    <<: *common
    image: ${SOLR:-islandora/solr:local}
    environment:
      SOLR_MODULES: extraction
    volumes:
      - ./test.sh:/test.sh # Test to run.
    command:
      - /test.sh # Run test and exit.
