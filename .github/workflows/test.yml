name: Test
on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      digests:
        required: true
        type: string
    secrets:
      REGISTRY_USER:
        required: true
      REGISTRY_PASSWORD:
        required: true
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/gradle-build-action@ac2d340dc04d9e1113182899e983b5400c17cda1 # v3
        with:
          cache-read-only: false

      - name: Run ${{ inputs.image }} tests
        shell: bash --noprofile --norc -xeuo pipefail {0}
        env:
          GRADLE_TASK: images:${{ inputs.image }}:test
          GRADLE_ARGS: -Pisle.test.pull=true ${{ inputs.digests }} --console=plain --stacktrace --warning-mode=summary
          TEST_IMAGE: ${{ inputs.image }}
        run: |
          print_test_logs() {
            local logs_found=0

            while IFS= read -r -d '' log_file; do
              logs_found=1
              echo "::group::${log_file}"
              sed -n '1,400p' "${log_file}"
              echo "::endgroup::"
            done < <(find "build/images/${TEST_IMAGE}/tests" -type f -name '*.log' -print0 | sort -z)

            if [[ "${logs_found}" -eq 0 ]]; then
              echo "No test log artifacts were found under build/images/${TEST_IMAGE}/tests."
            fi
          }

          if ! ./gradlew "${GRADLE_TASK}" ${GRADLE_ARGS}; then
            echo "::error::Gradle tests failed for ${TEST_IMAGE}. Dumping captured test logs."
            print_test_logs
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: ${{ inputs.image }} Test Logs
          path: build/**/*.log
